<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Lar Planejados</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: #11131a;
            color: #eef1f6;
        }
        .card {
            width: min(720px, 100%);
            background: #1a1d27;
            border: 1px solid #2d3240;
            border-radius: 12px;
            padding: 20px;
        }
        h1 { margin-top: 0; }
        code {
            background: #0f1117;
            padding: 2px 6px;
            border-radius: 6px;
        }
        a { color: #f0bf8c; }
    </style>
</head>
<body>
    <div class="card" id="message">
        <h1>Preparando o site...</h1>
        <p>Se o redirecionamento nao acontecer, abra <a href="index.php">index.php</a>.</p>
    </div>

    <script>
        if (location.protocol === 'http:' || location.protocol === 'https:') {
            location.replace('index.php');
        } else {
            document.getElementById('message').innerHTML = [
                '<h1>Como abrir este projeto</h1>',
                '<p>Este trabalho usa PHP + SQLite e precisa de servidor local.</p>',
                '<p>Voce abriu o arquivo direto (file://), por isso nao executa PHP.</p>',
                '<p><strong>Passos:</strong></p>',
                '<p>1) Instale PHP (ou XAMPP/Laragon).</p>',
                '<p>2) No terminal, rode na pasta do projeto: <code>php -S localhost:8000</code></p>',
                '<p>3) Abra: <a href="http://localhost:8000/index.php">http://localhost:8000/index.php</a></p>'
            ].join('');
        }
    </script>
</body>
</html>
